<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VRFN | Manager Hub</title>
  <link rel="stylesheet" href="style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
  <script src="main.js"></script>
</head>
<body data-page="manager">

  <div class="glow-wrapper">
    <div class="glow-1"></div>
  </div>

  <nav class="reveal">
    <div class="logo">VRFN</div>
    <div class="nav-links">
      <!-- Populated by main.js -->
    </div>
    <div class="user-pill">
      <!-- Populated by main.js -->
    </div>
  </nav>

  <main class="container reveal" style="padding-top: 8rem;">
    <header style="margin-bottom: 3rem; text-align: center;">
      <h1 style="font-size: 3.5rem; font-weight: 900; letter-spacing: -2px;">MANAGER HUB</h1>
      <p style="color: var(--text-secondary); font-weight: 600;">Manage your team's roster, signings, and fixtures.</p>
    </header>

    <div id="tab-content">
      <div style="text-align: center; padding: 4rem;">
        <p>Verifying manager status...</p>
      </div>
    </div>
  </main>

  <footer class="reveal">
    <div class="footer-content">
      <div class="footer-logo">VRFN</div>
      <p>© 2026 Virtual Reality Football Network. All Rights Reserved.</p>
    </div>
  </footer>

  <script>
    gsap.to(".reveal", {
      opacity: 1,
      y: 0,
      duration: 1.2,
      stagger: 0.1,
      ease: "power4.out"
    });
  </script>
</body>
</html>
