<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VRFN | Highlights</title>
  <link rel="stylesheet" href="style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
  <script src="main.js"></script>
</head>
<body>

  <div class="glow-wrapper">
    <div class="glow-1"></div>
  </div>

  <nav class="reveal">
    <div class="logo">
      <div class="logo-icon"></div>
      VRFN
    </div>
    <div class="nav-links">
      <a href="index.html">Home</a>
      <a href="league.html">League</a>
      <a href="profile.html">Profile</a>
      <a href="stats.html">Stats</a>
      <a href="clips.html" class="active">Clips</a>
    </div>
    <div style="display: flex; gap: 1rem; align-items: center;">
      <button class="theme-toggle" aria-label="Toggle Theme">🌓</button>
      <div class="user-pill">
        <div class="rank-badge" style="background: var(--gold);">BRONZE</div>
        <div class="user-avatar"></div>
        <span style="font-size: 0.85rem; font-weight: 800;">_theonlymillo_</span>
      </div>
    </div>
  </nav>

  <div class="container">
    
    <header class="reveal" style="display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 3rem;">
      <div>
        <h1 style="font-size: 3rem; font-weight: 900; letter-spacing: -1.5px;">Match Highlights</h1>
        <p style="color: var(--text-secondary); font-size: 1.1rem; margin-top: 0.5rem;">Showcase your best moments to the league scouts.</p>
      </div>
      <div style="text-align: right; background: rgba(255,255,255,0.03); padding: 0.8rem 1.2rem; border-radius: var(--radius-md); border: 1px solid var(--glass-border);">
        <p style="font-size: 0.7rem; font-weight: 700; opacity: 0.5; text-transform: uppercase;">Cloud Storage</p>
        <p style="font-size: 1rem; font-weight: 800;">0 / 5 CLIPS</p>
      </div>
    </header>

    <div class="reveal" style="margin-bottom: 2rem;">
      <button class="btn btn-primary" style="padding: 1rem 2rem;">+ Upload New Clip</button>
    </div>

    <div class="glass-card reveal" style="min-height: 400px; display: flex; flex-direction: column; justify-content: center; align-items: center; border-style: solid; border-color: rgba(255,255,255,0.05);">
        <div style="width: 80px; height: 80px; background: rgba(77, 166, 255, 0.05); border-radius: 50%; display: flex; align-items: center; justify-content: center; margin-bottom: 1.5rem;">
          <svg width="32" height="32" viewBox="0 0 24 24" fill="var(--accent-primary)"><polygon points="5 3 19 12 5 21 5 3"/></svg>
        </div>
        <p style="font-size: 1.2rem; font-weight: 700;">Your gallery is empty</p>
        <p style="font-size: 0.9rem; color: var(--text-secondary); margin-top: 0.5rem; max-width: 320px; text-align: center;">Capture and upload your best goals or saves. Scouts use these to evaluate player skill.</p>
    </div>

  </div>

  <footer class="reveal">
    <p style="font-weight: 600; letter-spacing: 0.5px;">VRFN | HYLIX NETWORK &copy; 2026</p>
  </footer>

  <script>
    gsap.to(".reveal", {
      opacity: 1,
      y: 0,
      duration: 1.4,
      stagger: 0.1,
      ease: "expo.out",
      delay: 0.1
    });
  </script>

</body>
</html>
