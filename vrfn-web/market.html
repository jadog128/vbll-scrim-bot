<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VRFN | Transfer Market</title>
  <link rel="stylesheet" href="style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
  <script src="main.js"></script>
  <script type="module">import { inject } from "https://esm.sh/@vercel/analytics"; inject();</script>
</head>
<body onload="loadPublicLeague()">

  <div class="glow-wrapper">
    <div class="glow-1"></div>
    <div class="glow-2"></div>
  </div>

  <nav class="reveal">
    <div class="logo">
      <div class="logo-icon"></div>
      VRFN
    </div>
    <div class="nav-links">
      <a href="index.html">Home</a>
      <a href="league.html">League</a>
      <a href="market.html" class="active">Market</a>
      <a href="schedule.html">Matches</a>
      <a href="finance.html">Finance</a>
      <a href="clips.html">Clips</a>
    </div>
    <div style="display: flex; gap: 1rem; align-items: center;">
      <button class="theme-toggle" aria-label="Toggle Theme">🌓</button>
    </div>
  </nav>

  <div class="container">
    <header class="reveal" style="margin-bottom: 4rem; text-align: center;">
      <h1 style="font-size: 4rem; font-weight: 900; letter-spacing: -2px; line-height: 1;">Transfer <span style="color: var(--accent-secondary);">Market.</span></h1>
      <p style="color: var(--text-secondary); font-size: 1.2rem; margin-top: 1rem;">Browse players currently listed for transfer or loan across the league.</p>
    </header>

    <div id="market-list" class="metric-grid reveal">
        <!-- Loaded via main.js -->
        <p style="grid-column: 1/-1; text-align: center; color: var(--text-secondary); padding: 4rem;">No players are currently listed for transfer.</p>
    </div>
  </div>

  <footer class="reveal" style="margin-top: 8rem; border-top: 1px solid var(--glass-border); padding: 4rem 8%;">
    <p style="text-align: center; color: var(--text-secondary); font-size: 0.85rem;">VRFN | Hylix &copy; 2026</p>
  </footer>

  <script>
    gsap.to(".reveal", { opacity: 1, y: 0, duration: 1.2, stagger: 0.1, ease: "expo.out" });
  </script>
</body>
</html>
